services:
  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./postgres_data:/var/lib/postgresql/data
    stdin_open: true
    tty: true

  backend:
    build: ./backend
    container_name: transcendence_backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - database
    stdin_open: true
    tty: true

  database:
    image: postgres:15
    container_name: transcendence_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: