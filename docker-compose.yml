services:
  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "4000:4000"
    env_file:
    - ./auth-service/.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    depends_on:
      auth-database:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  gateway:
    build: ./gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ./gateway/.env
    depends_on:
      - auth-service
      - user-service
    stdin_open: true
    tty: true

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "4001:4001"
    env_file:
      - ./user-service/.env
    volumes:
      - ./user-service:/app
      - /app/node_modules
    depends_on:
      user-database:
        condition: service_healthy
    stdin_open: true
    tty: true

  auth-database:
    image: postgres:15
    container_name: auth-db
    environment:
      - POSTGRES_USER=${AUTHDB_USER}
      - POSTGRES_PASSWORD=${AUTHDB_PASSWORD}
      - POSTGRES_DB=auth-db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  user-database:
    image: postgres:15
    container_name: user-db
    environment:
      - POSTGRES_USER=${USERDB_USER}
      - POSTGRES_PASSWORD=${USERDB_PASSWORD}
      - POSTGRES_DB=user-db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: token-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  auth_db_data:
  user_db_data:
  redis_data:
