services:
  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "4000:4000"
    env_file:
    - ./auth-service/.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    depends_on:
      auth-database:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  gateway:
    build: ./gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ./gateway/.env
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "4001:4001"
    env_file:
      - ./user-service/.env
    volumes:
      - ./user-service:/app
      - /app/node_modules
    depends_on:
      user-database:
        condition: service_healthy
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  chat-service:
    build: ./chat-service
    container_name: chat-service
    ports:
      - "3000:3000"
    env_file:
      - ./chat-service/.env
    volumes:
      - ./chat-service:/app
      - /app/node_modules
    depends_on:
      chat-database:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  chat-database:
    image: postgres:15
    container_name: chat-db
    environment:
      - POSTGRES_USER=${CHATDB_USER}
      - POSTGRES_PASSWORD=${CHATDB_PASSWORD}
      - POSTGRES_DB=chat-db
    ports:
      - "5434:5432"
    volumes:
      - chat_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  auth-database:
    image: postgres:15
    container_name: auth-db
    environment:
      - POSTGRES_USER=${AUTHDB_USER}
      - POSTGRES_PASSWORD=${AUTHDB_PASSWORD}
      - POSTGRES_DB=auth-db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  user-database:
    image: postgres:15
    container_name: user-db
    environment:
      - POSTGRES_USER=${USERDB_USER}
      - POSTGRES_PASSWORD=${USERDB_PASSWORD}
      - POSTGRES_DB=user-db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: token-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    # 외부 노출 차단: 호스트의 127.0.0.1에서만 접근 가능 (내부용)
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    # 다른 서비스의 내부 health 엔드포인트(예: http://auth-service:4000/health)에
    # 컨테이너 호스트명으로 직접 접근하기 위해 같은 default 네트워크에 둠
    depends_on:
      - auth-service
      - user-service
      - chat-service
      - gateway

volumes:
  auth_db_data:
  user_db_data:
  chat_db_data:
  redis_data:
  uptime_kuma_data:
